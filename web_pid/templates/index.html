<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced PID SCADA Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0a0a0a; 
            color: #e0e0e0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .dashboard { 
            background: linear-gradient(145deg, #151515, #1a1a1a); 
            padding: 30px; 
            border-radius: 6px; 
            width: 100%; 
            max-width: 950px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05); 
            border: 1px solid #2a2a2a;
        }
        h2 { 
            text-align: center; 
            color: #f39c12; 
            margin-top: 0; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
        }
        .chart-container { 
            position: relative; 
            height: 350px; 
            width: 100%; 
            margin-bottom: 20px; 
            background: #0d0d0d; 
            border-radius: 4px; 
            padding: 10px; 
            border: 1px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        
        /* Live Metrics HUD */
        .metrics-hud { 
            display: flex; 
            justify-content: space-around; 
            background: #111; 
            padding: 20px; 
            border-radius: 4px; 
            margin-bottom: 25px; 
            border: 1px solid #333;
            border-top: 3px solid #f39c12;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .metric-box { text-align: center; }
        .metric-label { font-size: 11px; color: #7f8c8d; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;}
        .metric-value { font-size: 28px; color: #00e676; font-family: 'Courier New', Courier, monospace; font-weight: bold; text-shadow: 0 0 10px rgba(0, 230, 118, 0.4); margin-top: 5px;}
        #hud-overshoot { color: #e74c3c; text-shadow: 0 0 10px rgba(231, 76, 60, 0.4); }
        #hud-sse { color: #3498db; text-shadow: 0 0 10px rgba(52, 152, 219, 0.4); }
        #hud-pwm { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.4); }
        
        /* Controls */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .control-group { 
            background: #181818; 
            padding: 15px 20px; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border: 1px solid #2a2a2a;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        label { font-weight: 600; width: 140px; color: #bdc3c7; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;}
        input[type=range] { 
            flex-grow: 1; 
            margin: 0 15px; 
            cursor: pointer; 
            accent-color: #f39c12;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
        }
        .val-display { 
            background: #000; 
            padding: 6px 12px; 
            border-radius: 3px; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold;
            width: 50px; 
            text-align: center; 
            border: 1px solid #f39c12; 
            color: #f39c12;
            box-shadow: 0 0 8px rgba(243, 156, 18, 0.2);
        }
        
        /* Buttons */
        .btn-group { grid-column: span 2; display: flex; gap: 15px; margin-top: 15px; }
        button { 
            flex: 1; 
            padding: 18px; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        .btn-start { 
            background: linear-gradient(180deg, #27ae60, #2ecc71); 
            color: #fff; 
            border: 1px solid #1e8449; 
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3), inset 0 1px 0 rgba(255,255,255,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .btn-stop { 
            background: linear-gradient(180deg, #c0392b, #e74c3c); 
            color: #fff; 
            border: 1px solid #922b21; 
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3), inset 0 1px 0 rgba(255,255,255,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        button:active { transform: translateY(1px); filter: brightness(0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>Industrial SCADA | PID Tuning</h2>
    
    <div class="chart-container">
        <canvas id="pidChart"></canvas>
    </div>

    <!-- LIVE METRICS HUD -->
    <div class="metrics-hud">
        <div class="metric-box">
            <div class="metric-label">PWM Output</div>
            <div class="metric-value" id="hud-pwm">0.0%</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Max Overshoot</div>
            <div class="metric-value" id="hud-overshoot">0.0%</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Steady-State Error</div>
            <div class="metric-value" id="hud-sse">0.0%</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Settling Time (2%)</div>
            <div class="metric-value" id="hud-settling">0.00s</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Target RPM</label>
            <input type="range" id="target" min="0" max="60" value="0" step="1" oninput="updateVal('target')">
            <div class="val-display" id="target-val">0</div>
        </div>
        <div class="control-group">
            <label>Proportional (Kp)</label>
            <input type="range" id="kp" min="0" max="5.0" value="1.5" step="0.1" oninput="updateVal('kp')">
            <div class="val-display" id="kp-val">1.5</div>
        </div>
        <div class="control-group">
            <label>Integral (Ki)</label>
            <input type="range" id="ki" min="0" max="3.0" value="1.5" step="0.1" oninput="updateVal('ki')">
            <div class="val-display" id="ki-val">1.5</div>
        </div>
        <div class="control-group">
            <label>Derivative (Kd)</label>
            <input type="range" id="kd" min="0" max="0.5" value="0.0" step="0.01" oninput="updateVal('kd')">
            <div class="val-display" id="kd-val">0.0</div>
        </div>
        
        <div class="btn-group">
            <button class="btn-start" onclick="toggleMotor(true)">START SYSTEM</button>
            <button class="btn-stop" onclick="toggleMotor(false)">EMERGENCY STOP</button>
        </div>
    </div>
</div>

<script>
    // --- UI Control Logic ---
    function updateVal(id) {
        let val = document.getElementById(id).value;
        document.getElementById(id + '-val').innerText = val;
        sendUpdate();
    }

    let isRunning = false;
    function toggleMotor(state) {
        isRunning = state;
        if (!state) document.getElementById('target').value = 0; 
        updateVal('target'); 
    }

    function sendUpdate() {
        fetch('/api/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                target_rpm: document.getElementById('target').value,
                Kp: document.getElementById('kp').value,
                Ki: document.getElementById('ki').value,
                Kd: document.getElementById('kd').value,
                running: isRunning
            })
        });
    }

    // --- Advanced Chart.js Setup (Dual Lines) ---
    const ctx = document.getElementById('pidChart').getContext('2d');
    const pidChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [
                { label: 'Target Setpoint', borderColor: '#f39c12', borderDash: [5, 5], borderWidth: 2, pointRadius: 0, data: [], zIndex: 3 },
                { label: 'Smoothed Curve', borderColor: '#00e676', backgroundColor: 'rgba(0, 230, 118, 0.15)', borderWidth: 3, pointRadius: 0, fill: true, data: [], zIndex: 2 },
                { label: 'Raw Sensor Data', borderColor: '#555555', borderWidth: 1, pointRadius: 0, data: [], zIndex: 1, opacity: 0.5 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: {
                x: { display: false }, 
                y: { min: 0, max: 70, grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
            },
            plugins: { legend: { labels: { color: '#c9d1d9' } } }
        }
    });

    // --- Real-Time Data Fetching Loop ---
    let timeTick = 0;
    setInterval(() => {
        fetch('/api/data')
            .then(res => res.json())
            .then(data => {
                timeTick++;
                
                // Update Graph Lines
                pidChart.data.labels.push(timeTick);
                pidChart.data.datasets[0].data.push(data.target_rpm);
                pidChart.data.datasets[1].data.push(data.smoothed_rpm); 
                pidChart.data.datasets[2].data.push(data.actual_rpm);   

                // Keep graph scrolling gracefully
                if (pidChart.data.labels.length > 100) {
                    pidChart.data.labels.shift();
                    pidChart.data.datasets[0].data.shift();
                    pidChart.data.datasets[1].data.shift();
                    pidChart.data.datasets[2].data.shift();
                }
                pidChart.update();

                // Update Live Metrics HUD
                document.getElementById('hud-pwm').innerText = data.pwm.toFixed(1) + '%';
                document.getElementById('hud-overshoot').innerText = data.overshoot.toFixed(1) + '%';
                document.getElementById('hud-sse').innerText = data.sse.toFixed(1) + '%';
                document.getElementById('hud-settling').innerText = data.settling_time.toFixed(2) + 's';
            })
            .catch(err => console.error("Waiting for backend...", err));
    }, 100);
</script>

</body>
</html>
